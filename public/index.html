<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Todo App — Beranda</title>
        <!-- Bootstrap 5 CSS via CDN -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <!-- Bootstrap Icons -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    </head>
    <body class="bg-light">

        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
            <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-check2-square me-2"></i>TodoApp
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="index.html">Beranda</a>
                <a class="nav-link" href="form.html">Tambah Todo</a>
                <a class="nav-link" href="data.html">Lihat Data</a>
            </div>
            </div>
        </nav>

        <!-- Hero Section -->
        <section class="bg-primary text-white py-5">
            <div class="container text-center py-4">
            <h1 class="display-4 fw-bold">📋 Selamat Datang di TodoApp</h1>
            <p class="lead mt-3">Kelola tugas dan catatan harianmu dengan mudah,
                cepat, dan terorganisir.</p>
            <div class="mt-4 d-flex justify-content-center gap-3">
                <a href="form.html" class="btn btn-light btn-lg fw-bold">
                <i class="bi bi-plus-circle me-2"></i>Tambah Todo Baru
                </a>
                <a href="data.html" class="btn btn-outline-light btn-lg">
                <i class="bi bi-table me-2"></i>Lihat Semua Data
                </a>
            </div>
            </div>
        </section>

        <!-- Card Statistik (diisi jQuery) -->
        <section class="container my-5">
            <div class="row g-4">
            <div class="col-md-4">
                <div class="card text-white bg-success shadow-sm">
                <div class="card-body text-center">
                    <i class="bi bi-check-circle display-4"></i>
                    <h3 class="mt-2" id="countDone">-</h3>
                    <p class="mb-0">Selesai</p>
                </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-warning shadow-sm">
                <div class="card-body text-center">
                    <i class="bi bi-hourglass-split display-4"></i>
                    <h3 class="mt-2" id="countInProgress">-</h3>
                    <p class="mb-0">Sedang Dikerjakan</p>
                </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-secondary shadow-sm">
                <div class="card-body text-center">
                    <i class="bi bi-clock display-4"></i>
                    <h3 class="mt-2" id="countPending">-</h3>
                    <p class="mb-0">Belum Dikerjakan</p>
                </div>
                </div>
            </div>
            </div>
        </section>

        <!-- jQuery -->
        <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
        <!-- Bootstrap 5 JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

        <script>
            // Ambil statistik dari API saat halaman dimuat
            const API_URL = 'http://localhost:3000/api';

            $(document).ready(function () {
            $.get(API_URL + '/todos', function (response) {
                const todos = response.data;
                $('#countDone').text(todos.filter(t => t.status === 'done').length);
                $('#countInProgress').text(todos.filter(t => t.status === 'in-progress').length);
                $('#countPending').text(todos.filter(t => t.status === 'pending').length);
            });
            });
        </script>
    </body>
</html>
