<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Todo App — Data</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
        <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    </head>
    <body class="bg-light">

        <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
            <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-check2-square me-2"></i>TodoApp
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Beranda</a>
                <a class="nav-link" href="form.html">Tambah Todo</a>
                <a class="nav-link active" href="data.html">Lihat Data</a>
            </div>
            </div>
        </nav>

        <div class="container my-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">
                <i class="bi bi-table me-2 text-primary"></i>Daftar Semua Todo
            </h4>
            <a href="form.html" class="btn btn-primary">
                <i class="bi bi-plus-circle me-2"></i>Tambah Baru
            </a>
            </div>

            <div id="alertContainer" class="mb-3"></div>

            <div class="card shadow-sm">
            <div class="card-body">
                <table id="todosTable" class="table table-striped table-hover w-100">
                <thead class="table-primary">
                    <tr>
                    <th>No</th>
                    <th>Judul</th>
                    <th>Deskripsi</th>
                    <th>Prioritas</th>
                    <th>Status</th>
                    <th>Dibuat</th>
                    <th class="text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody></tbody>
                </table>
            </div>
            </div>
        </div>

        <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
        <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="js/main.js"></script>
    </body>
</html>
